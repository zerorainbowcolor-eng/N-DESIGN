<script>
  // 各作品のスライド定義
  // 通常画像は文字列、縦スクロールスライドは {type:'scroll', images:[...]} で指定
  const extraImages = {
    1: [{ type: 'scroll', images: ['images/work1B.jpg'] }],
    2: ['images/portfolio2A.jpg'],
    3: ['images/portfolio3A.jpg'],
    10: ['images/work4A.jpg'],
  };

  let currentSlide = 0;
  let slideImages = [];

  function buildSlider(images) {
    const track = document.getElementById('slider-track');
    const dots  = document.getElementById('slider-dots');
    track.innerHTML = '';
    dots.innerHTML  = '';
    slideImages = images;

    images.forEach((item, i) => {
      const slide = document.createElement('div');
      slide.className = 'w-full shrink-0';
      slide.style.minWidth = '100%';

      if (item && item.type === 'scroll') {
        // 縦スクロールスライド
        slide.style.cssText = 'min-width:100%; height:70vw; max-height:500px; overflow-y:auto; background:#111;';
        item.images.forEach(src => {
          const img = document.createElement('img');
          img.src = src;
          img.alt = '';
          img.style.cssText = 'width:100%; display:block;';
          slide.appendChild(img);
        });
        // スクロール促すラベル
        const label = document.createElement('div');
        label.style.cssText = 'position:sticky; bottom:8px; text-align:center; pointer-events:none;';
        label.innerHTML = '<span style="background:rgba(0,0,0,0.6);color:#fff;font-size:0.7rem;padding:4px 10px;border-radius:20px;">↓ スクロールして見る</span>';
        slide.appendChild(label);
      } else {
        // 通常画像スライド
        const img = document.createElement('img');
        img.src = item;
        img.alt = '';
        img.className = 'w-full h-auto';
        slide.appendChild(img);
      }

      track.appendChild(slide);

      const dot = document.createElement('button');
      dot.className = `w-2 h-2 rounded-full transition ${i === 0 ? 'bg-tiffany' : 'bg-white/60'}`;
      dot.onclick = () => goToSlide(i);
      dots.appendChild(dot);
    });

    document.getElementById('slide-prev').classList.toggle('hidden', images.length <= 1);
    document.getElementById('slide-next').classList.toggle('hidden', images.length <= 1);
    dots.classList.toggle('hidden', images.length <= 1);
    goToSlide(0);
  }

  function goToSlide(n) {
    currentSlide = Math.max(0, Math.min(n, slideImages.length - 1));
    document.getElementById('slider-track').style.transform = `translateX(-${currentSlide * 100}%)`;
    document.querySelectorAll('#slider-dots button').forEach((d, i) => {
      d.className = `w-2 h-2 rounded-full transition ${i === currentSlide ? 'bg-tiffany' : 'bg-white/60'}`;
    });
    document.getElementById('slide-prev').style.visibility = currentSlide === 0 ? 'hidden' : 'visible';
    document.getElementById('slide-next').style.visibility = currentSlide === slideImages.length - 1 ? 'hidden' : 'visible';
  }

  function slideMove(dir) { goToSlide(currentSlide + dir); }

    { category: 'LP制作', title: 'ランディングページ 02', concept: 'スマホファーストで設計し、スクロールに連動した演出でユーザーを自然にCTAへ誘導します。', target: 'スマートフォンユーザーの20〜40代', tools: 'Figma / Studio' },
    { category: '名刺制作', title: 'ビジネス名刺 01', concept: 'シンプルかつ印象に残るデザイン。QRコードを活用してデジタルとリアルを繋げる設計にしました。', target: '対面営業・名刺交換の機会が多い方', tools: 'Illustrator' },

    { category: 'バナー制作', title: '資産運用セミナー バナー', concept: '投資初心者の不安を取り除き、「まずは無料で学んでみよう」と思ってもらうための資産運用セミナー告知バナー。<br><br><span style="font-size:0.875rem; font-weight:700; color:#001638;">デザイン構成</span><br>爽やかなブルーを基調とした配色で、金融分野に求められる信頼感と安心感を演出。中央に「資産運用セミナー」の大きなメインコピーを配置し、サービス内容を一目で伝えた。初心者マークや貯金箱・紙幣・コインのイラストを用いることで、投資未経験者でも気軽に参加できる印象を付与。「累計受講者5,000名突破」の実績訴求で信頼性を高め、「参加費無料」「当日参加OK」「毎週水曜20時開催」といった参加ハードルの低さを視覚的に強調。情報を優先順位ごとに整理し、視線が自然にメインコピーから参加メリットへ流れる構成とした。', target: '20〜50代の資産形成に興味がある投資未経験者。NISAや投資信託に関心はあるものの、何から始めればよいかわからず学習機会を探している層。', tools: 'Photoshop' },

    { category: 'バナー制作', title: '家庭用光脱毛器 販促バナー', concept: '自宅で手軽に本格的な脱毛ケアをしたい女性に向けて、サロン級の仕上がりとコストパフォーマンスの高さを訴求する販促バナー。<br><br><span style="font-size:0.875rem; font-weight:700; color:#001638;">デザイン構成</span><br>淡いパープルのグラデーションを基調に、清潔感と上品さを演出。右側に美しい素肌の女性モデルを大きく配置することで、商品使用後の理想的なイメージを直感的に伝えた。中央の「最短2週間でつるすべ肌に」という大きなキャッチコピーでベネフィットを明確に訴求し、「痛みレス」「サロン級」のキーワードによって安心感と期待感を高めた。また、「IPL方式」「VIO・顔対応」「敏感肌OK」の特徴をボックス形式で整理し、商品の強みを瞬時に理解できる構成とした。さらに、通常価格と期間限定価格を対比させてお得感を強調し、下部の大きなCTAボタンへ自然に視線が流れる導線設計により、購入アクションを促した。', target: '20代〜40代の女性。サロンやクリニックに通う時間が取れず、自宅で効率的にムダ毛ケアを行いたいと考えている美容意識の高い層。', tools: 'Photoshop' },
    { category: 'バナー制作', title: '美容脱毛サロン 友だち紹介キャンペーンバナー', concept: '夏に向けて肌への意識が高まる時期に、友だち紹介キャンペーンを活用しながら脱毛をはじめる後押しをした、期間限定プロモーションバナー。<br><br><span style="font-size:0.875rem; font-weight:700; color:#001638;">デザイン構成</span><br>青空と光のエフェクトを背景に、夏らしい開放感と透明感を演出した。右側には空を見上げて微笑む女性モデルを大きく配置し、施術後の清潔感ある肌と明るい未来を視覚的に表現した。「夏前に自信の肌へ！」というメインコピーに「Summer」の手書き風フォントを添えることで、季節感と親しみやすさを加えた。また、「最大20,000円キャッシュバック」という数字を大きく強調することでお得感を一目で伝え、「友だち紹介キャンペーン」のラベルと対象期間の明示により、限定感と信頼感を高めた。「まずは無料カウンセリングから」という一文で心理的ハードルを下げ、行動を促す導線設計とした。', target: '20代〜30代の女性。夏前に肌の自信を取り戻したいと考えており、キャッシュバックなどのお得な特典をきっかけに行動に移りやすい、美容意識の高い層を想定した。', tools: 'Photoshop' },
    { category: 'バナー制作', title: 'レストラン スペシャルコースバナー', concept: '特別な夜の体験を求める大人に向けて、シェフ厳選のコース料理と予約限定特典の魅力を訴求したレストランプロモーションバナー。<br><br><span style="font-size:0.875rem; font-weight:700; color:#001638;">デザイン構成</span><br>ネイビーとゴールドを基調に、高級感と格調のある世界観を統一して表現した。4分割されたグリッドに料理・ワイン・夜景などの写真を配置し、コースの多彩な魅力を一度に伝えた。中央にはダイヤ形のネイビーパネルを配置し、「シェフ厳選のスペシャルコース」というメインコピーをゴールドの装飾とともに際立たせることで、視線を自然に集める構造にした。四隅のアラベスク風装飾枠が全体に統一感と上品さを加え、「予約限定特典付き」のローレルエンブレムが希少性と限定感を演出した。', target: '30代〜50代の男女。記念日や接待など、非日常の特別なシーンで上質な食体験を求める、グルメ意識の高い層を想定した。', tools: 'Photoshop' },
    { category: 'バナー制作', title: '抹茶ラテ 商品バナー', concept: '老舗茶寮の本格抹茶を使ったラテの品質と価格を訴求した、シンプルで素材の魅力が伝わる商品バナー。<br><br><span style="font-size:0.875rem; font-weight:700; color:#001638;">デザイン構成</span><br>鮮やかな抹茶グリーンを背景に、商品の色味と自然に調和させながら瑞々しさと鮮度感を表現した。中央に抹茶ラテのグラスを大きく配置し、グリーンとミルクの美しいグラデーションを視覚的に強調。左下には抹茶パウダーを盛った器を添え、素材の本物感を補強した。「老舗茶寮が贈る」というコピーをゴールドで縦組みにすることで、伝統と格式を品よく伝えた。上部と下部をグリーンと黒で二分割する構成が和モダンな雰囲気を生み出し、「600円」という価格表示を黒エリアに配置することで視認性と親しみやすさを両立させた。', target: '20代〜50代の男女。日常の中で本物志向の和スイーツ・ドリンクを楽しみたい、抹茶好き・日本茶文化に親しみのある層を想定した。', tools: 'Photoshop' },
    { category: 'バナー制作', title: '女子旅 プロモーションバナー', concept: '仲間との旅行で生まれる特別な思い出を前面に打ち出した、グループ旅行を後押しするプロモーションバナー。<br><br><span style="font-size:0.875rem; font-weight:700; color:#001638;">デザイン構成</span><br>ミントブルーを背景に、明るく親しみやすい雰囲気を統一して表現した。「仲間と一生の思い出を作ろう！」というメインコピーを六角形のふきだし形状で中央に大きく配置し、旅への期待感を高めた。周囲には飛行機・バス・紅葉・ラーメン・ビール・浴衣姿の女性・自撮りする友人グループなど、旅の多彩なシーンをちりばめることで、グループ旅行のワクワク感を視覚的に表現した。ポラロイド風の写真素材やガーランド・きらめきのイラストを散りばめることで、SNS映えを意識したポップでかわいらしい世界観に仕上げた。', target: '20代〜30代の女性グループ。友人や同僚と一緒に旅行を計画しており、観光・グルメ・温泉など多彩な体験を楽しみたいと考えている層を想定した。', tools: 'Photoshop' },
  ];

  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id')) || 1;

    // スライダー構築
    const bannerImages = {

    const mainImg = bannerImages[id] || `images/portfolio${id}.jpg`;

  }
